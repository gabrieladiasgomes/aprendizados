<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>
    <script type="text/javascript">
        var a = 5;
        var b = 10;
        console.log(a + b);
        console.log(a * b);
        console.log(a / b);
        console.log(a - b);
        console.log(a % b);
        console.log(a>b);
        console.log(a<b);
        console.log(a==b);
        console.log(a!=b);
        console.log(a>=b);
        console.log(a<=b);
    </script>
</body>
</html>
